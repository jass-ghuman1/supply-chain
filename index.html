<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPPLY CHAIN INTELLIGENCE TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050d1a;
    --bg2: #07111f;
    --card: #0a1828;
    --card2: #0d1f30;
    --border: #1a3050;
    --border2: #0f2035;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --accent3: #005577;
    --up: #00ff88;
    --down: #ff3355;
    --warn: #ffaa00;
    --text: #c8dff0;
    --text2: #7a9db8;
    --text3: #3a607a;
    --glow: rgba(0, 212, 255, 0.15);
    --risk1: #00ff88;
    --risk2: #44ff66;
    --risk3: #88ff44;
    --risk4: #ccff00;
    --risk5: #ffee00;
    --risk6: #ffaa00;
    --risk7: #ff7700;
    --risk8: #ff4400;
    --risk9: #ff2200;
    --risk10: #ff0033;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    overflow: hidden;
    height: 100vh;
  }
  /* SCANLINE EFFECT */
  body::before {
    content: '';
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
  /* HEADER */
  #header {
    background: linear-gradient(90deg, #050d1a 0%, #071522 40%, #050d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  #header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanh 4s linear infinite;
  }
  @keyframes scanh { 0%{opacity:0.3} 50%{opacity:1} 100%{opacity:0.3} }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 10px; }
  #clock {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,212,255,0.4);
    letter-spacing: 1px;
  }
  #status-bar {
    display: flex; gap: 16px; align-items: center;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 8px var(--up);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 10px; color: var(--text2); letter-spacing: 1px; }
  /* SEARCH BAR */
  #search-wrap {
    padding: 8px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    position: relative;
  }
  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 7px 12px 7px 32px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--glow); }
  #search::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 12px;
  }
  #autocomplete {
    position: absolute; top: 100%; left: 12px; right: 12px;
    background: var(--card2); border: 1px solid var(--accent3);
    z-index: 100; max-height: 200px; overflow-y: auto;
    display: none;
  }
  .ac-item {
    padding: 7px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border2);
    transition: background 0.1s;
  }
  .ac-item:hover { background: var(--accent3); }
  .ac-ticker { color: var(--accent); font-weight: 700; min-width: 80px; }
  .ac-name { color: var(--text2); }
  /* LAYOUT */
  #main {
    display: flex;
    height: calc(100vh - 52px - 52px);
  }
  /* SIDEBAR */
  #sidebar {
    width: 300px;
    min-width: 300px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
  }
  #sidebar-header {
    padding: 8px 12px;
    background: var(--card2);
    border-bottom: 1px solid var(--border2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sec-title { font-size: 10px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }
  #company-count { font-size: 10px; color: var(--accent); }
  #company-list {
    overflow-y: auto; flex: 1;
  }
  #company-list::-webkit-scrollbar { width: 4px; }
  #company-list::-webkit-scrollbar-track { background: var(--bg2); }
  #company-list::-webkit-scrollbar-thumb { background: var(--accent3); }
  .co-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border2);
    cursor: pointer;
    transition: background 0.15s;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .co-item:hover { background: rgba(0,212,255,0.05); }
  .co-item.active {
    background: rgba(0,212,255,0.1);
    border-left: 2px solid var(--accent);
  }
  .co-left { display: flex; flex-direction: column; gap: 3px; }
  .co-ticker { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .co-name { font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .co-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .co-price { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); }
  .co-change { font-size: 10px; }
  .co-risk { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  /* RISK BAR */
  .risk-bar {
    display: flex; gap: 1.5px;
  }
  .rb { width: 5px; height: 9px; background: var(--border); border-radius: 1px; }
  .rb.filled { }
  .risk-label { font-size: 9px; color: var(--text3); }
  /* DETAIL PANEL */
  #detail {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: var(--bg);
  }
  #detail::-webkit-scrollbar { width: 4px; }
  #detail::-webkit-scrollbar-track { background: var(--bg); }
  #detail::-webkit-scrollbar-thumb { background: var(--accent3); }
  #welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%;
    gap: 16px;
  }
  .welcome-logo {
    font-family: 'Orbitron', monospace;
    font-size: 28px; font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,212,255,0.4);
    letter-spacing: 6px;
  }
  .welcome-sub { color: var(--text3); letter-spacing: 3px; font-size: 11px; }
  .welcome-hint { color: var(--text2); font-size: 11px; margin-top: 20px; border: 1px solid var(--border); padding: 12px 24px; letter-spacing: 1px; }
  /* DETAIL HEADER */
  #co-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .co-detail-name {
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
  }
  .co-detail-ticker {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    background: var(--accent3);
    color: var(--accent);
    padding: 2px 10px;
    border: 1px solid var(--accent);
    letter-spacing: 2px;
    display: inline-block;
    margin-top: 4px;
  }
  .co-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: 9px; padding: 2px 8px;
    border: 1px solid; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-sector { border-color: var(--accent3); color: var(--accent2); }
  .badge-region { border-color: #1a4040; color: #00aaaa; }
  .badge-disc-PARTIAL_PUBLIC { border-color: #1a4a00; color: var(--up); }
  .badge-disc-LIMITED_PUBLIC { border-color: #4a3000; color: var(--warn); }
  .badge-disc-UNKNOWN { border-color: #4a0000; color: var(--down); }
  /* PRICE BLOCK */
  .price-block {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  .price-main {
    font-family: 'Space Mono', monospace;
    font-size: 32px; font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
  }
  .price-change {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700;
  }
  .price-currency { font-size: 12px; color: var(--text3); }
  .price-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; }
  /* METRICS GRID */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .metric-card {
    background: var(--card);
    border: 1px solid var(--border2);
    padding: 10px 12px;
  }
  .metric-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .metric-value { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); }
  /* RISK SECTION */
  .risk-section {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 14px;
  }
  .risk-section-title { font-size: 10px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border2); padding-bottom: 8px; }
  .risk-row {
    display: flex; align-items: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .risk-row-label { font-size: 11px; color: var(--text2); min-width: 160px; }
  .risk-bar-lg { display: flex; gap: 3px; }
  .rbl { width: 18px; height: 16px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
  .risk-score-lg { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; min-width: 30px; }
  .risk-factors { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .risk-factor { background: var(--card2); border: 1px solid var(--border2); padding: 4px 10px; font-size: 10px; color: var(--text2); }
  .risk-factor span { color: var(--accent); }
  /* TABS */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px; gap: 0;
  }
  .tab {
    padding: 8px 18px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  /* SUPPLY CHAIN NODES */
  .sc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .sc-node {
    background: var(--card);
    border: 1px solid var(--border2);
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .sc-node::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  }
  .sc-node:hover { border-color: var(--accent); background: var(--card2); transform: translateY(-1px); }
  .sc-node-ticker { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .sc-node-name { font-size: 10px; color: var(--text2); margin: 3px 0; }
  .sc-node-role { font-size: 9px; padding: 1px 6px; border: 1px solid var(--accent3); color: var(--accent2); display: inline-block; margin-bottom: 6px; letter-spacing: 1px; }
  .sc-node-price { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
  .sc-node-change { font-size: 10px; margin-left: 6px; }
  .sc-node-risk-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .sc-node-risk-label { font-size: 10px; }
  .in-db { cursor: pointer; }
  .in-db .sc-node-ticker::after { content: ' ↗'; font-size: 9px; opacity: 0.6; }
  /* SEC FILINGS */
  .sec-section { }
  .sec-item {
    background: var(--card);
    border: 1px solid var(--border2);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .sec-item-left { }
  .sec-filing-type { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .sec-filing-desc { font-size: 10px; color: var(--text2); margin-top: 3px; }
  .sec-btn {
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
  }
  .sec-btn:hover { background: var(--accent3); }
  .sec-disc-banner {
    background: var(--card2); border: 1px solid var(--border);
    padding: 12px; margin-bottom: 12px; font-size: 11px; color: var(--text2); line-height: 1.6;
  }
  .sec-disc-banner strong { color: var(--accent); }
  /* LOADING SPINNER */
  .loading {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .price-loading { color: var(--text3); font-size: 11px; }
  /* TICKER TAPE */
  #ticker-tape {
    height: 26px;
    background: var(--card2);
    border-top: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  #tape-inner {
    display: flex; align-items: center;
    height: 100%;
    white-space: nowrap;
    animation: scroll-left 120s linear infinite;
    gap: 0;
  }
  @keyframes scroll-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tape-item {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 16px;
    border-right: 1px solid var(--border2);
    font-size: 10px;
    font-family: 'Space Mono', monospace;
  }
  .tape-ticker { color: var(--accent); font-weight: 700; }
  .tape-price { color: var(--text); }
  .tape-up { color: var(--up); }
  .tape-down { color: var(--down); }
  /* ERROR */
  .err { color: var(--down); font-size: 10px; }
  /* REFRESH INDICATOR */
  #refresh-bar {
    height: 2px;
    background: var(--accent3);
    position: fixed; top: 0; left: 0;
    transition: width 1s linear;
  }
  /* UP/DOWN COLORS */
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--text2); }
  /* EMPTY STATE */
  .empty-state {
    padding: 24px; text-align: center; color: var(--text3); font-size: 11px;
    letter-spacing: 1px;
  }
  /* NO DB BADGE */
  .no-db { opacity: 0.7; }
  .no-db .sc-node-ticker::after { display: none; }
  .sc-section-header {
    font-size: 10px; color: var(--text3); letter-spacing: 2px;
    text-transform: uppercase; margin: 14px 0 8px;
    border-bottom: 1px solid var(--border2); padding-bottom: 6px;
  }
</style>
</head>
<body>

<div id="refresh-bar" style="width:0%"></div>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">SUPPLY CHAIN TERMINAL <span>// TOP 100 GLOBAL</span></div>
  </div>
  <div id="status-bar">
    <div class="status-dot"></div>
    <div class="status-text">LIVE</div>
    <div id="clock">--:--:-- UTC</div>
  </div>
</div>

<!-- SEARCH -->
<div id="search-wrap">
  <span class="search-icon">⌕</span>
  <input id="search" type="text" placeholder="SEARCH COMPANY OR TICKER..." autocomplete="off">
  <div id="autocomplete"></div>
</div>

<!-- MAIN LAYOUT -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="sec-title">Companies</span>
      <span id="company-count">100</span>
    </div>
    <div id="company-list"></div>
  </div>
  <!-- DETAIL PANEL -->
  <div id="detail">
    <div id="welcome">
      <div class="welcome-logo">SCT</div>
      <div class="welcome-sub">SUPPLY CHAIN INTELLIGENCE TERMINAL</div>
      <div class="welcome-hint">← SELECT A COMPANY TO VIEW SUPPLY CHAIN ANALYSIS</div>
    </div>
    <div id="co-view" style="display:none"></div>
  </div>
</div>

<!-- TICKER TAPE -->
<div id="ticker-tape"><div id="tape-inner"></div></div>

function getRiskScore(ticker) {
  const co = DB[ticker];
  if (!co) return 5;
  const sr = SECTOR_RISK[co.s] || 5;
  const gr = GEO_RISK[co.r] || 0;
  const dr = DISC_RISK[co.d] || 0;
  return Math.max(1, Math.min(10, Math.round(sr + gr + dr)));
}
function getRiskColor(score) {
  const c = ['','#00ff88','#44ff66','#88ff44','#ccff00','#ffee00','#ffaa00','#ff7700','#ff4400','#ff2200','#ff0033'];
  return c[Math.min(10,Math.max(1,score))];
}
function getRiskLabel(score) {
  if (score<=2) return 'VERY LOW';
  if (score<=4) return 'LOW';
  if (score<=6) return 'MODERATE';
  if (score<=8) return 'HIGH';
  return 'CRITICAL';
}

const prices = {};

// Collect all tickers
function getAllTickers() {
  const set = new Set(Object.keys(DB));
  for (const co of Object.values(DB)) {
    for (const s of co.sup) if (s[1]) set.add(s[1]);
    for (const c of co.cus) if (c[1]) set.add(c[1]);
  }
  return [...set];
}

async function fetchPrices(tickers) {
  // Yahoo Finance via allorigins proxy in batches of 15
  const batches = [];
  for (let i = 0; i < tickers.length; i += 15) batches.push(tickers.slice(i, i+15));

  for (const batch of batches) {
    const syms = batch.join(',');
    const url = `https://query1.finance.yahoo.com/v8/finance/quote?symbols=${encodeURIComponent(syms)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketVolume,regularMarketOpen,regularMarketPreviousClose,regularMarketDayHigh,regularMarketDayLow,marketCap,currency&formatted=false`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    try {
      const resp = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
      const data = await resp.json();
      const quotes = data?.quoteResponse?.result || [];
      for (const q of quotes) {
        prices[q.symbol] = {
          price: q.regularMarketPrice,
          change: q.regularMarketChange,
          changePct: q.regularMarketChangePercent,
          volume: q.regularMarketVolume,
          open: q.regularMarketOpen,
          prevClose: q.regularMarketPreviousClose,
          high: q.regularMarketDayHigh,
          low: q.regularMarketDayLow,
          marketCap: q.marketCap,
          currency: q.currency || 'USD',
          ts: Date.now()
        };
      }
    } catch(e) { /* silent fail per batch */ }
    await new Promise(r => setTimeout(r, 150));
  }
}

function fmt(n, dec=2) {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (Math.abs(n) >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (Math.abs(n) >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1000) return n.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return Number(n).toFixed(dec);
}
function fmtPrice(p) {
  if (p == null) return '—';
  if (p >= 1000) return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  return p.toFixed(2);
}
function priceDisplay(ticker) {
  const p = prices[ticker];
  if (!p || !p.price) return {price:'Loading…',change:'',cls:'flat'};
  const cls = p.change > 0 ? 'up' : p.change < 0 ? 'down' : 'flat';
  const sign = p.change > 0 ? '+' : '';
  return {
    price: fmtPrice(p.price),
    change: `${sign}${p.change?.toFixed(2)} (${sign}${p.changePct?.toFixed(2)}%)`,
    cls
  };
}

// ============================================================
// RISK BAR RENDERER

function renderRiskBar(score, size='sm') {
  const color = getRiskColor(score);
  const cls = size === 'sm' ? 'rb' : 'rbl';
  const sz = size === 'sm' ? '' : '';
  let html = `<div class="risk-bar${size==='lg'?' risk-bar-lg':''}">`;
  for (let i=1; i<=10; i++) {
    const filled = i <= score;
    html += `<div class="${cls}" style="${filled ? `background:${color};box-shadow:0 0 4px ${color}40` : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

    return `<div class="tape-item">

const searchEl = document.getElementById('search');
const acEl = document.getElementById('autocomplete');

searchEl.addEventListener('input', () => {
  const val = searchEl.value.toLowerCase();
  buildSidebar(val);
  if (!val) { acEl.style.display='none'; return; }
  const matches = tickers.filter(t => {
    const co = DB[t];
    return t.toLowerCase().includes(val) || co.n.toLowerCase().includes(val);
  }).slice(0, 8);
  if (!matches.length) { acEl.style.display='none'; return; }
  acEl.style.display = 'block';
  acEl.innerHTML = matches.map(t => `<div class="ac-item" onclick="selectAC('${t}')">
    <span class="ac-ticker">${t}</span>
    <span class="ac-name">${DB[t].n}</span>
  </div>`).join('');
});
searchEl.addEventListener('blur', () => setTimeout(()=>acEl.style.display='none', 200));
function selectAC(t) { searchEl.value=''; acEl.style.display='none'; buildSidebar(''); showCompany(t); }

// ============================================================
// MAIN PRICE REFRESH LOOP
// ============================================================
let refreshProgress = 0;
let refreshProgressTimer = null;

function animateRefreshBar() {
  refreshProgress = 0;
  const bar = document.getElementById('refresh-bar');
  bar.style.width = '0%';
  clearInterval(refreshProgressTimer);
  refreshProgressTimer = setInterval(() => {
    refreshProgress += 100 / (REFRESH_INTERVAL / 1000);
    bar.style.width = Math.min(refreshProgress, 100) + '%';
  }, 1000);
}

async function fullRefresh() {
  const allTickers = getAllTickers();
  await fetchPrices(allTickers);
  buildSidebar(searchEl.value);
  buildTape();
  if (currentTicker) renderDetail();
  lastRefresh = Date.now();
  animateRefreshBar();
}

// Initial load
(async () => {
  buildSidebar();
  buildTape();
  await fullRefresh();
  setInterval(fullRefresh, REFRESH_INTERVAL);
})();
